<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">

<title>CRAB AGENT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Cache-busting query string (bump on every deploy that touches
     css/dashboard.css or any js/ file below): mobile browsers and
     wallet in-app WebViews cache static assets far more aggressively
     and persistently than a desktop dev environment, which is
     usually hard-refreshed constantly during development - without
     this, a phone that already visited the site once can keep
     running JS/CSS from before the latest fix indefinitely, with no
     visible sign anything is stale. This was the real root cause
     behind fixes that tested correctly on desktop but not on mobile. -->
<link rel="stylesheet" href="css/dashboard.css?v=7">

</head>

<body>

<div class="app">

<header class="topbar">

<div class="logo">

<img src="images/body.png">

<div>

<h2>CRAB AGENT</h2>

<span>Powered by CRABSEM</span>

</div>

</div>

<div class="search">

<input
id="searchInput"
type="text"
placeholder="Search token or paste contract..."
autocomplete="off">

</div>

<div class="top-right">

<a href="faq.html#legend" target="_blank" rel="noopener noreferrer" class="helpBtn" title="How signals work">?</a>

<div class="live-status" id="liveStatus">

<span class="live-dot" id="liveStatusDot"></span>

<span id="liveStatusText">LIVE</span>

</div>

<div class="walletMenu" id="walletMenu">

<button id="walletButton" class="walletTrigger">

Connect Wallet

</button>

<div class="walletDropdown" id="walletDropdown">

<div class="walletDropdownHeader">

<div class="walletAvatar">🦀</div>

<div>

<div class="walletDropdownTitle" id="walletTierLabel">
Holder Verified
</div>

<div class="walletDropdownSub" id="walletAddressShort">
--
</div>

</div>

</div>

<div class="walletDropdownRow">

<span>Balance</span>

<strong id="walletBalanceText">--</strong>

</div>

<div class="walletDropdownRow">

<span>Tier</span>

<span class="walletTierPill" id="walletTierText">--</span>

</div>

<a
id="walletExplorerLink"
class="walletDropdownLink"
href="#"
target="_blank"
rel="noopener noreferrer">

View on Explorer ↗

</a>

<button id="walletLogoutBtn" class="walletLogoutBtn">

Logout

</button>

</div>

</div>

</div>

</header>



<div class="statsCompact" id="statsCompact">

<div class="statItem">

<span class="statLabel">Monitoring</span>

<span class="statValue" id="totalCoins">0</span>

<small class="statSub" id="discoverySubLabel"></small>

</div>

<div class="statDivider"></div>

<div class="statItem">

<span class="statLabel">Signals</span>

<span class="statValue" id="signalCount">0</span>

</div>

<div class="statDivider"></div>

<div class="statItem" id="engineStat">

<span class="statLabel">Engine</span>

<span class="statValue" id="engineStatusText">Healthy</span>

</div>

<div class="statDivider"></div>

<div class="statItem liveMonitorStat">

<span class="statLabel">Scheduler Last Run</span>

<span class="statValue" id="lastAnalysisText">Checking...</span>

<small class="statSub" id="nextScanText"></small>

</div>

</div>



<div class="modeTabs" id="modeTabs">

<button class="modeTab active" data-mode="trending" onclick="switchMode('trending')">Trending</button>
<button class="modeTab" data-mode="recently-viewed" onclick="switchMode('recently-viewed')">Recently Viewed</button>
<button class="modeTab" data-mode="watchlist" onclick="switchMode('watchlist')">Watch Later</button>
<button class="modeTab" data-mode="favorites" onclick="switchMode('favorites')">★ Favorites</button>

</div>

<div class="content">

<div class="coin-area">

<div id="skeletonGrid" class="coin-grid skeleton-grid">

</div>

<div id="coinGrid" class="coin-grid">

</div>

</div>

<aside class="detail-panel">

<button id="closeDetailBtn" class="closeDetailBtn">✕ Close</button>

<div id="detailContent">

<div class="empty">

<h2>

CRAB AGENT

</h2>

<p>

Select a coin to see AI analysis.

</p>

</div>

</div>

</aside>

</div>

</div>

<script src="js/config.js?v=11"></script>
<script src="js/analytics.js?v=11"></script>
<script src="js/detect.js?v=11"></script>
<script src="js/engine.js?v=11"></script>
<script src="js/backendApi.js?v=11"></script>
<script src="js/ui.js?v=11"></script>
<script src="js/dashboard.js?v=11"></script>

</body>

</html>
